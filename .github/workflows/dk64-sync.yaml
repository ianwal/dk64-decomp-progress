name: sync dk64

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Fetch upstream dk64
      run: |
        git remote add dk64-upstream https://gitlab.com/dk64_decomp/dk64.git
        git fetch dk64-upstream main

    - name: Check for changes
      id: check
      run: |
        UPSTREAM_SHA=$(git rev-parse dk64-upstream/main)
        CURRENT_SHA=$(git rev-parse origin/dk64 2>/dev/null || echo "none")
        if [ "$UPSTREAM_SHA" != "$CURRENT_SHA" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes detected, skipping build."
        fi

    - name: Update dk64 branch
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -B dk64 dk64-upstream/main
        git push origin dk64 --force

    - name: Trigger build
      if: steps.check.outputs.changed == 'true'
      run: gh workflow run dk64-build.yaml
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
