options:
  basename: jetpac
  find_file_boundaries: yes
  compiler: "IDO"
  platform: n64
  asm_end_label: "endlabel"
  generated_c_preamble: |
    #include <ultra64.h>
    #include "functions.h"
  symbol_addrs_path: symbol_addrs.jetpac.us.txt
  undefined_funcs_auto_path: undefined_funcs_auto.jetpac.us.txt
  undefined_syms_auto_path: undefined_syms_auto.jetpac.us.txt
  base_path: ..
  target_path: build/us/jetpac.us.bin
  asset_path: bin
  build_path: build/us
segments:
  - name: code
    dir: jetpac
    type: code
    start: 0x00000000
    vram: 0x80024000
    subsegments:
      - [0x0, c, code_0]
      - [0x1460, c, code_1460]
      - [0x3060, c, code_3060]
      - [0x3480, c, code_3480]
      - [0x4FC0, c, code_4FC0]
  - name: data
    type: code
    dir: jetpac
    start: 0x7090
    vram: 0x8002B090
    subsegments:
      - [0x7090, bin, data_7090]
  - [0xAC30]