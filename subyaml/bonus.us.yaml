options:
  basename: bonus
  find_file_boundaries: yes
  compiler: "IDO"
  platform: n64
  cpp_args:
    - "-Iinclude"
    - "-Iinclude/2.0L"
    - "-D_LANGUAGE_C"
  generated_c_preamble: |
    #include <ultra64.h>
    #include "functions.h"
    #include "variables.h"
  create_detected_syms: yes
  undefined_syms_path: undefined_syms.us.txt
  symbol_addrs_path: symbol_addrs.bonus.us.txt
  undefined_funcs_auto_path: undefined_funcs_auto.bonus.us.txt
  undefined_syms_auto_path: undefined_syms_auto.bonus.us.txt
  base_path: .
  target_path: build/us/bonus.us.bin
  asset_path: bin
  build_path: build/us
segments:
  - name: code
    dir: bonus
    type: code
    start: 0x00000000
    vram: 0x80024000
    subsegments:
      - [0x0, c, code_0]
      - [0x12A0, c, code_12A0]
      - [0x2690, c, code_2690]
      - [0x9010, c, code_9010]
  - name: data
    dir: bonus
    type: code
    start: 0x9860
    vram: 0x8002D860
    subsegments:
      - [0x9860, bin, data_9860]
  - [0x9EF0]