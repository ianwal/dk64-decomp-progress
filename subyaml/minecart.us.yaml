options:
  basename: minecart
  find_file_boundaries: yes
  compiler: "IDO"
  platform: n64
  asm_end_label: "endlabel"
  generated_c_preamble: |
    #include <ultra64.h>
    #include "functions.h"
  symbol_addrs_path: symbol_addrs.minecart.us.txt
  undefined_funcs_auto_path: undefined_funcs_auto.minecart.us.txt
  undefined_syms_auto_path: undefined_syms_auto.minecart.us.txt
  base_path: ..
  target_path: build/us/minecart.us.bin
  asset_path: bin
  build_path: build/us
segments:
  - name: code
    dir: minecart
    type: code
    start: 0x00000000
    vram: 0x80024000
    subsegments:
      - [0x0, c, code_0]
      - [0x25F0, c, code_25F0]
  - name: data
    type: code
    dir: minecart
    start: 0x4B90
    vram: 0x80028B90
    subsegments:
      - [0x4B90, bin, data_4B90]
  - [0x4E10]