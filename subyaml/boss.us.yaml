options:
  basename: boss
  find_file_boundaries: yes
  compiler: "IDO"
  platform: n64
  cpp_args:
    - "-Iinclude"
    - "-Iinclude/2.0L"
    - "-D_LANGUAGE_C"
  generated_c_preamble: |
    #include <ultra64.h>
    #include "functions.h"
  create_detected_syms: yes
  undefined_syms_path: undefined_syms.us.txt
  symbol_addrs_path: symbol_addrs.boss.us.txt
  undefined_funcs_auto_path: undefined_funcs_auto.boss.us.txt
  undefined_syms_auto_path: undefined_syms_auto.boss.us.txt
  base_path: .
  target_path: build/us/boss.us.bin
  asset_path: bin
  build_path: build/us
segments:
  - name: code
    dir: boss
    type: code
    start: 0x00000000
    vram: 0x80024000
    subsegments:
      - [0x0, c, code_0]
      - [0x3840, c, code_3840]
      - [0x52B0, c, code_52B0]
      - [0x6240, c, code_6240]
      - [0x8520, c, code_8520]
      - [0x9230, c, code_9230]
      - [0x9C60, c, code_9C60]
      - [0xC920, c, code_C920]
      - [0xF0D0, c, code_F0D0]
  - name: data
    dir: boss
    type: code
    start: 0x118B0
    vram: 0x800358B0
    subsegments:
      - [0x118B0, bin, data_118B0]
  - [0x12DC0]