options:
  basename: water
  find_file_boundaries: yes
  compiler: "IDO"
  platform: n64
  asm_end_label: "endlabel"
  generated_c_preamble: |
    #include <ultra64.h>
    #include "functions.h"
  symbol_addrs_path: symbol_addrs.water.us.txt
  undefined_funcs_auto_path: undefined_funcs_auto.water.us.txt
  undefined_syms_auto_path: undefined_syms_auto.water.us.txt
  base_path: ..
  target_path: build/us/water.us.bin
  asset_path: bin
  build_path: build/us
segments:
  - name: code
    dir: water
    type: code
    start: 0x00000000
    vram: 0x80024000
    subsegments:
      - [0x0, c, code_0]
      - [0x3340, c, code_3340]
  - name: data
    dir: water
    type: code
    start: 0x57F0
    vram: 0x800297F0
    subsegments:
      - [0x57F0, bin, data_57F0]
  - [0x61B0] #0x61B0