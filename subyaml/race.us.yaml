options:
  basename: race
  find_file_boundaries: yes
  compiler: "IDO"
  platform: n64
  asm_end_label: "endlabel"
  generated_c_preamble: |
    #include <ultra64.h>
    #include "functions.h"
  symbol_addrs_path: symbol_addrs.race.us.txt
  undefined_funcs_auto_path: undefined_funcs_auto.race.us.txt
  undefined_syms_auto_path: undefined_syms_auto.race.us.txt
  base_path: ..
  target_path: build/us/race.us.bin
  asset_path: bin
  build_path: build/us
segments:
  - name: code
    dir: race
    type: code
    start: 0x00000000
    vram: 0x80024000
    subsegments:
      - [0x0, c, code_0]
      - [0x36B0, c, code_36B0]
      - [0x7BD0, c, code_7BD0]
      - [0xA960, c, code_A960]
  - name: data
    type: code
    dir: race
    start: 0xBB10
    vram: 0x8002FB10
    subsegments:
      - [0xBB10, bin, data_BB10]
  - [0xC160]